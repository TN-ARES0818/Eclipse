<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Eclipse Search</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/results.css">
</head>
<body>

<!-- ══ TOP BAR ══════════════════════════════════════════════════════ -->
<div class="res-topbar">
  <button class="res-back-btn" onclick="goBackToHome()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
  </button>
  <div class="res-search-wrap">
    <div class="res-search-bar" id="resSearchBar">
      <svg class="res-search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" class="res-search-input" id="resSearchInput"
        placeholder="Search Eclipse..."
        onkeyup="if(event.key==='Enter')reSearch()"
        onfocus="document.getElementById('resSearchBar').classList.add('focused')"
        onblur="document.getElementById('resSearchBar').classList.remove('focused')">
      <button class="res-clear-btn" id="resClearBtn" onclick="clearSearch()">✕</button>
    </div>
  </div>
  <button class="res-search-go" onclick="reSearch()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
  </button>
</div>

<!-- ══ TAB CHIPS ════════════════════════════════════════════════════ -->
<div class="res-tabs" id="resTabs">
  <div class="res-tab active" data-tab="all"     onclick="switchTab(this,'all')">🌐 All</div>
  <div class="res-tab"        data-tab="news"    onclick="switchTab(this,'news')">📰 News</div>
  <div class="res-tab"        data-tab="images"  onclick="switchTab(this,'images')">🖼 Images</div>
  <div class="res-tab"        data-tab="videos"  onclick="switchTab(this,'videos')">▶ Videos</div>
</div>

<!-- ══ RESULTS META ══════════════════════════════════════════════════ -->
<div class="res-meta" id="resMeta"></div>

<!-- ══ MAIN RESULTS AREA ════════════════════════════════════════════ -->
<div class="res-list" id="resList">
  <!-- Skeleton loading shown by JS -->
</div>

<!-- ══ IMAGE GRID (images tab) ══════════════════════════════════════ -->
<div class="res-img-grid" id="resImgGrid" style="display:none"></div>

<!-- ══ FOOTER ════════════════════════════════════════════════════════ -->
<div class="res-footer" id="resFooter" style="display:none">
  <div class="res-footer-brand">
    <span class="res-footer-logo">🌑</span>
    <span>Eclipse Search · Powered by SearXNG</span>
  </div>
</div>

<!-- ══ TOAST ══════════════════════════════════════════════════════════ -->
<div class="res-toast" id="restoast"></div>

<script src="js/results.js"></script>
</body>
</html>
